<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>무한 노트</title>
<style>
/* =========================================
   CSS 
   ========================================= */
body, html {
    margin: 0; padding: 0; width: 100%; height: 100%; 
    overflow: hidden; background-color: #f0f0f0; 
    -webkit-touch-callout: none; -webkit-user-select: none;
    user-select: none; -webkit-tap-highlight-color: transparent; 
}

#canvas-container { 
    position: fixed; top: 0; left: 0;
    width: 100vw; height: 100vh; 
    cursor: grab; touch-action: none; 
}

#canvas {
    position: absolute; width: 5000px; height: 5000px; 
    background-image: radial-gradient(#d1d1d1 1px, transparent 1px);
    background-size: 40px 40px; transform-origin: 0 0; 
}

#arrow-layer { 
    position: absolute; top: 0; left: 0; 
    width: 100%; height: 100%; overflow: visible; 
    pointer-events: none; z-index: 1; 
}

.arrow-path { stroke: #999; stroke-width: 1.5px; fill: none; pointer-events: stroke; cursor: pointer; }
.arrow-path.confirm { stroke: #f44336; stroke-width: 3px; }

.post-it {
    position: absolute; background-color: #fff9c4;
    box-shadow: 0.15em 0.15em 0.5em rgba(0,0,0,0.1);
    padding: 1em; border-radius: 0.3em; box-sizing: border-box; 
    display: flex; flex-direction: column; line-height: 1.3; z-index: 2;
    transition: outline 0.1s, box-shadow 0.1s;
}

[contenteditable]:focus { outline: none; }
.post-it-title, .post-it-content { -webkit-user-select: none; user-select: none; cursor: default; }
.post-it.selected .post-it-title, .post-it.selected .post-it-content { -webkit-user-select: text; user-select: text; cursor: text; }
.post-it-title { font-weight: bold; font-size: 1.1em; margin-bottom: 0.3em; word-break: break-word; }
.post-it-content { flex: 1; font-size: 0.9em; overflow: hidden; word-break: break-word; }

.post-it.selected { outline: 0.15em solid #2196F3; box-shadow: 0.25em 0.25em 1em rgba(33, 150, 243, 0.3); }
.post-it.multi-selected { outline: 0.2em solid #BA68C8; box-shadow: 0.25em 0.25em 1em rgba(186, 104, 200, 0.4); }
.post-it.multi-selected.confirm-delete { outline: 0.2em solid #f44336; box-shadow: 0.25em 0.25em 1em rgba(244, 67, 54, 0.4); }
.post-it.search-match { outline: 0.3em solid #f44336 !important; box-shadow: 0 0 1.5em rgba(244, 67, 54, 0.7) !important; z-index: 5; }

.post-it.bg-yellow { background-color: #fff9c4; }
.post-it.bg-pink { background-color: #f8bbd0; }
.post-it.bg-green { background-color: #c8e6c9; }
.post-it.bg-blue { background-color: #b3e5fc; }

.post-it-menu { display: none; position: absolute; top: -2.8em; left: 50%; transform: translateX(-50%); background: white; padding: 0.2em 0.5em; border-radius: 1em; box-shadow: 0 0.1em 0.4em rgba(0,0,0,0.15); gap: 0.4em; z-index: 10; }
.post-it.selected .post-it-menu { display: flex; }
.color-btn { border: none; background: none; font-size: 1.2em; cursor: pointer; padding: 0; display: flex; align-items: center; }

.handle { display: none; position: absolute; width: 2.2em; height: 2.2em; background-color: white; border-radius: 50%; box-shadow: 0 0.1em 0.4em rgba(0,0,0,0.2); z-index: 12; align-items: center; justify-content: center; font-size: 1em; border: 0.15em solid #2196F3; }
.post-it.selected .handle { display: flex; }
.post-it.multi-selected .move-handle { display: flex; border-color: #BA68C8; }
.post-it.multi-selected .move-handle::after { color: #BA68C8; }
.post-it.multi-selected.confirm-delete .move-handle { display: none; } 

.move-handle { top: -1.1em; left: -1.1em; cursor: grab; }
.move-handle:active { cursor: grabbing; }
.move-handle::after { content: '✥'; color: #2196F3; font-size: 1.2em; }
.resize-handle { bottom: -1.1em; right: -1.1em; cursor: nwse-resize; }
.resize-handle::after { content: '↘'; color: #2196F3; font-weight: bold; font-size: 1.2em; }
.delete-handle { top: -1.1em; right: -1.1em; cursor: pointer; border-color: #9e9e9e; }
.delete-handle::after { content: '✖'; color: #9e9e9e; font-size: 1em; font-weight: bold; }
.delete-handle.confirm { background-color: #f44336; border-color: #f44336; }
.delete-handle.confirm::after { content: '🗑️'; color: white; }

.conn-point { display: none; position: absolute; width: 1em; height: 1em; background-color: #2196F3; border: 0.15em solid white; border-radius: 50%; z-index: 13; cursor: crosshair; }
.post-it.selected .conn-point, .post-it.drag-target .conn-point { display: block; }
.conn-top { top: -0.5em; left: calc(50% - 0.5em); }
.conn-bottom { bottom: -0.5em; left: calc(50% - 0.5em); }
.conn-left { top: calc(50% - 0.5em); left: -0.5em; }
.conn-right { top: calc(50% - 0.5em); right: -0.5em; }

#multi-ui-panel { 
    display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); 
    background: white; padding: 10px 20px; border-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
    align-items: center; gap: 15px; z-index: 9999; font-weight: bold; color: #BA68C8; 
}
#multi-ui-panel.active { display: flex; }
#multi-ui-panel button { padding: 8px 12px; border: none; border-radius: 8px; background: #f3e5f5; color: #BA68C8; font-weight: bold; cursor: pointer; }
#multi-ui-panel button:active { background: #e1bee7; }

#ui-layer {
    position: fixed; bottom: 20px; right: 20px; 
    display: flex; flex-direction: column; align-items: flex-end; gap: 10px; z-index: 9999;
}
#ui-layer button:not(.search-nav-btn) {
    width: 50px; height: 50px; font-size: 24px; border-radius: 50%; border: 1px solid #ccc; background: white; cursor: pointer; box-shadow: 2px 2px 10px rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center;
}
#ui-layer button:disabled { background-color: #e0e0e0; color: #9e9e9e; border-color: #d4d4d4; box-shadow: none; cursor: not-allowed; }

#search-container {
    display: flex; flex-direction: row; align-items: center; background: white; border-radius: 25px; border: 1px solid #ccc; box-shadow: 2px 2px 10px rgba(0,0,0,0.2); height: 50px; overflow: hidden; transition: width 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
}
#search-container.collapsed { width: 50px; }
#search-container.expanded { width: 340px; }
#search-toggle-btn { width: 50px; min-width: 50px; height: 50px; font-size: 20px; border: none; background: transparent; cursor: pointer; }
#search-inputs { display: flex; align-items: center; gap: 6px; opacity: 0; transition: opacity 0.2s; pointer-events: none; width: 280px; padding-right: 15px; }
#search-container.expanded #search-inputs { opacity: 1; pointer-events: auto; }
#search-input { flex: 1; width: 80px; padding: 6px 10px; border: 1px solid #ddd; border-radius: 15px; outline: none; font-size: 14px; }
.search-nav-btn { background: #f0f0f0; border: 1px solid #ccc; border-radius: 15px; padding: 4px 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; }
.search-nav-btn:active { background: #e0e0e0; }
#search-counter { font-size: 14px; font-weight: bold; white-space: nowrap; color: #555; }
</style>
</head>
<body>

<div id="canvas-container">
    <div id="canvas">
        <svg id="arrow-layer">
            <defs>
                <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><polygon points="0 0, 6 3, 0 6" fill="#999" /></marker>
                <marker id="arrowhead-danger" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><polygon points="0 0, 6 3, 0 6" fill="#f44336" /></marker>
            </defs>
        </svg>
    </div>
</div>

<div id="multi-ui-panel">
    <span id="multi-count">0개 선택됨</span>
    <button id="align-h-btn" title="가로 정렬">↔ 가로 정렬</button>
    <button id="align-v-btn" title="세로 정렬">↕ 세로 정렬</button>
</div>

<input type="file" id="file-input" accept=".json" style="display: none;" />

<div id="ui-layer">
    <div id="search-container" class="collapsed">
        <button id="search-toggle-btn" title="검색">🔍</button>
        <div id="search-inputs">
            <input type="text" id="search-input" placeholder="검색어 입력..." autocomplete="off" />
            <button id="search-go-btn" class="search-nav-btn">Go</button>
            <button id="search-prev-btn" class="search-nav-btn" title="이전">◀</button>
            <span id="search-counter">0/0</span>
            <button id="search-next-btn" class="search-nav-btn" title="다음">▶</button>
        </div>
    </div>
    <button id="fullscreen-btn" title="전체 화면">⛶</button>
    <button id="undo-btn" title="실행 취소">↶</button>
    <button id="redo-btn" title="다시 실행">↷</button>
    <button id="fit-btn" title="한눈에 보기">⌂</button>
    <button id="import-btn" title="파일 열기">📂</button>
    <button id="export-btn" title="파일로 저장">💾</button>
    <button id="view-mode-btn" title="모드 전환">🔓</button>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const container = document.getElementById('canvas-container');
    const canvas = document.getElementById('canvas');
    const arrowLayer = document.getElementById('arrow-layer');
    const modeBtn = document.getElementById('view-mode-btn');
    const exportBtn = document.getElementById('export-btn'); 
    const importBtn = document.getElementById('import-btn'); 
    const fileInput = document.getElementById('file-input'); 
    const undoBtn = document.getElementById('undo-btn'); 
    const redoBtn = document.getElementById('redo-btn'); 
    const fitBtn = document.getElementById('fit-btn'); 
    const multiUiPanel = document.getElementById('multi-ui-panel');
    const multiCount = document.getElementById('multi-count');
    const alignHBtn = document.getElementById('align-h-btn');
    const alignVBtn = document.getElementById('align-v-btn');
    const fullscreenBtn = document.getElementById('fullscreen-btn');

    const searchContainer = document.getElementById('search-container');
    const searchToggleBtn = document.getElementById('search-toggle-btn');
    const searchInput = document.getElementById('search-input');
    const searchGoBtn = document.getElementById('search-go-btn');
    const searchPrevBtn = document.getElementById('search-prev-btn');
    const searchNextBtn = document.getElementById('search-next-btn');
    const searchCounter = document.getElementById('search-counter');

    if (!container || !canvas) return;

    let scale = 1; let translateX = 0; let translateY = 0;
    let isPanning = false; let startX = 0; let startY = 0;
    let isDraggingPostIt = false; let isResizing = false; let isDrawingArrow = false;
    let currentPostIt = null; let postItStartX = 0; let postItStartY = 0;
    let initialWidth = 0; let initialHeight = 0; 
    let isEditMode = true; let selectedPostIt = null; 
    let clickStartX = 0; let clickStartY = 0; let justCreated = false; 

    let isMultiSelectMode = false; let multiSelectedNodes = []; 
    let longPressTimer = null; let wasLongPressed = false;

    let draggingNodes = new Map(); 
    let edges = []; let tempEdge = null; let tempPathElement = null;

    let historyStack = []; let redoStack = []; const MAX_HISTORY = 30; 
    let searchMatches = []; let currentSearchIndex = -1;

    function generateId() { return '_' + Math.random().toString(36).substr(2, 9); }

    function getCanvasData() {
        const postIts = [];
        document.querySelectorAll('.post-it').forEach(el => {
            let colorClass = 'bg-yellow';
            if(el.classList.contains('bg-pink')) colorClass = 'bg-pink';
            if(el.classList.contains('bg-green')) colorClass = 'bg-green';
            if(el.classList.contains('bg-blue')) colorClass = 'bg-blue';

            postIts.push({
                id: el.id, left: el.style.left, top: el.style.top, width: el.style.width, height: el.style.height,
                fontSize: el.style.fontSize, colorClass: colorClass,
                title: el.querySelector('.post-it-title').innerHTML, content: el.querySelector('.post-it-content').innerHTML
            });
        });
        return { scale, translateX, translateY, postIts, edges };
    }

    function updateUndoRedoUI() {
        if (undoBtn) undoBtn.disabled = historyStack.length <= 1;
        if (redoBtn) redoBtn.disabled = redoStack.length === 0;
    }

    function pushHistory() {
        const data = getCanvasData();
        historyStack.push(JSON.stringify({ postIts: data.postIts, edges: data.edges }));
        if (historyStack.length > MAX_HISTORY) historyStack.shift();
        redoStack = []; 
        updateUndoRedoUI();
    }

    function restoreState(stateStr) {
        const data = JSON.parse(stateStr);
        clearSelection(); clearMultiSelection(); clearSearch(); 
        document.querySelectorAll('.post-it').forEach(el => el.remove());
        document.querySelectorAll('.arrow-path').forEach(el => el.remove());
        edges = data.edges || [];
        data.postIts.forEach(p => {
            const newPostIt = buildPostItDOM(p.id, p.left, p.top, p.width, p.height, p.colorClass, p.title, p.content, p.fontSize);
            canvas.appendChild(newPostIt);
        });
        drawArrows(); updateUndoRedoUI();
    }

    if (undoBtn) {
        undoBtn.addEventListener('click', () => {
            if (historyStack.length <= 1) return; 
            redoStack.push(historyStack.pop());
            restoreState(historyStack[historyStack.length - 1]);
        });
    }

    if (redoBtn) {
        redoBtn.addEventListener('click', () => {
            if (redoStack.length === 0) return;
            const nextState = redoStack.pop();
            historyStack.push(nextState);
            restoreState(nextState);
        });
    }

    /* [신규] 전체 화면 스크립트 기능 구현 */
    if (fullscreenBtn) {
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    alert(`전체 화면 실패: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        });
    }

    document.addEventListener('fullscreenchange', () => {
        if (document.fullscreenElement) {
            fullscreenBtn.textContent = '🗗'; fullscreenBtn.title = "전체 화면 종료";
        } else {
            fullscreenBtn.textContent = '⛶'; fullscreenBtn.title = "전체 화면";
        }
    });

    searchToggleBtn.addEventListener('click', () => {
        if (searchContainer.classList.contains('expanded')) {
            searchContainer.classList.remove('expanded'); searchContainer.classList.add('collapsed'); searchInput.value = ''; clearSearch();
        } else {
            searchContainer.classList.remove('collapsed'); searchContainer.classList.add('expanded'); searchInput.focus();
        }
    });

    function clearSearch() { searchMatches.forEach(el => el.classList.remove('search-match')); searchMatches = []; currentSearchIndex = -1; searchCounter.textContent = '0/0'; }

    function performSearch() {
        clearSearch();
        const rawKeyword = searchInput.value; const keyword = rawKeyword.replace(/\s+/g, '').toLowerCase();
        if (!keyword) return;

        const postIts = document.querySelectorAll('.post-it');
        postIts.forEach(el => {
            const titleText = el.querySelector('.post-it-title').textContent.replace(/\s+/g, '').toLowerCase();
            const contentText = el.querySelector('.post-it-content').textContent.replace(/\s+/g, '').toLowerCase();
            if (titleText.includes(keyword) || contentText.includes(keyword)) { el.classList.add('search-match'); searchMatches.push(el); }
        });

        if (searchMatches.length > 0) { currentSearchIndex = 0; updateSearchUI(); focusOnMatch(searchMatches[currentSearchIndex]); } 
        else { searchCounter.textContent = '0/0'; }
    }

    searchGoBtn.addEventListener('click', performSearch);
    searchInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') performSearch(); });
    searchNextBtn.addEventListener('click', () => { if (searchMatches.length === 0) return; currentSearchIndex = (currentSearchIndex + 1) % searchMatches.length; updateSearchUI(); focusOnMatch(searchMatches[currentSearchIndex]); });
    searchPrevBtn.addEventListener('click', () => { if (searchMatches.length === 0) return; currentSearchIndex = (currentSearchIndex - 1 + searchMatches.length) % searchMatches.length; updateSearchUI(); focusOnMatch(searchMatches[currentSearchIndex]); });

    function updateSearchUI() { searchCounter.textContent = `${currentSearchIndex + 1}/${searchMatches.length}`; }

    function focusOnMatch(el) {
        const l = parseFloat(el.style.left); const t = parseFloat(el.style.top); const w = parseFloat(el.style.width); const h = parseFloat(el.style.height);
        const cx = l + w / 2; const cy = t + h / 2; const screenW = window.innerWidth; const screenH = window.innerHeight;
        translateX = screenW / 2 - cx * scale; translateY = screenH / 2 - cy * scale; updateTransform();
    }

    if (fitBtn) {
        fitBtn.addEventListener('click', () => {
            const postIts = document.querySelectorAll('.post-it');
            /* [신규] 포스트잇이 없는 상태에서 누르면 캔버스 정중앙(2500,2500) 정렬 */
            if (postIts.length === 0) { 
                scale = 1; 
                translateX = (window.innerWidth / 2) - 2500; 
                translateY = (window.innerHeight / 2) - 2500; 
                updateTransform(); return; 
            }
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            postIts.forEach(el => {
                const l = parseFloat(el.style.left); const t = parseFloat(el.style.top);
                const w = parseFloat(el.style.width); const h = parseFloat(el.style.height);
                if (l < minX) minX = l; if (t < minY) minY = t; if (l + w > maxX) maxX = l + w; if (t + h > maxY) maxY = t + h;
            });
            const padding = 150; const contentW = maxX - minX; const contentH = maxY - minY;
            const screenW = window.innerWidth; const screenH = window.innerHeight;
            const scaleX = screenW / (contentW + padding * 2); const scaleY = screenH / (contentH + padding * 2);
            scale = Math.min(scaleX, scaleY, 2); 
            const contentCX = minX + contentW / 2; const contentCY = minY + contentH / 2;
            translateX = screenW / 2 - contentCX * scale; translateY = screenH / 2 - contentCY * scale; updateTransform();
        });
    }

    function applyDataToCanvas(data) {
        scale = data.scale || 1; 
        if(scale < 0.05 || scale > 10) scale = 1; 
        translateX = data.translateX || 0; translateY = data.translateY || 0;
        updateTransform();
        restoreState(JSON.stringify({ postIts: data.postIts, edges: data.edges }));
        historyStack = []; redoStack = []; pushHistory();
    }

    function exportDataToFile() {
        const data = getCanvasData(); const dataStr = JSON.stringify(data);
        const blob = new Blob([dataStr], { type: "application/json" }); const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; const d = new Date();
        a.download = `canvas_${d.getFullYear()}${(d.getMonth()+1).toString().padStart(2,'0')}${d.getDate().toString().padStart(2,'0')}_${d.getHours().toString().padStart(2,'0')}${d.getMinutes().toString().padStart(2,'0')}.json`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    }

    function importDataFromFile(event) {
        const file = event.target.files[0]; if (!file) return; const reader = new FileReader();
        reader.onload = function(e) { try { const data = JSON.parse(e.target.result); applyDataToCanvas(data); saveDataToLocal(); } catch(err) { alert("잘못된 파일 형식입니다."); } };
        reader.readAsText(file); event.target.value = ''; 
    }

    function saveDataToLocal() { const data = getCanvasData(); localStorage.setItem('infiniteCanvasData', JSON.stringify(data)); }
    function loadDataFromLocal() {
        const saved = localStorage.getItem('infiniteCanvasData'); if (!saved) return false;
        try { const data = JSON.parse(saved); applyDataToCanvas(data); return true; } catch(e) { return false; }
    }

    function buildPostItDOM(id, left, top, width, height, colorClass, titleHTML, contentHTML, fSize) {
        const newPostIt = document.createElement('div');
        newPostIt.className = `post-it ${colorClass}`; newPostIt.id = id; newPostIt.style.left = left; newPostIt.style.top = top; newPostIt.style.width = width; newPostIt.style.height = height;

        const moveHandle = document.createElement('div'); moveHandle.className = 'handle move-handle';
        const deleteHandle = document.createElement('div'); deleteHandle.className = 'handle delete-handle';
        const resizeHandle = document.createElement('div'); resizeHandle.className = 'handle resize-handle';
        
        const connTop = document.createElement('div'); connTop.className = 'conn-point conn-top'; connTop.dataset.port = 'top';
        const connBottom = document.createElement('div'); connBottom.className = 'conn-point conn-bottom'; connBottom.dataset.port = 'bottom';
        const connLeft = document.createElement('div'); connLeft.className = 'conn-point conn-left'; connLeft.dataset.port = 'left';
        const connRight = document.createElement('div'); connRight.className = 'conn-point conn-right'; connRight.dataset.port = 'right';

        const menu = document.createElement('div'); menu.className = 'post-it-menu';
        menu.innerHTML = `<button class="color-btn" data-color="yellow">🟡</button><button class="color-btn" data-color="pink">🔴</button><button class="color-btn" data-color="green">🟢</button><button class="color-btn" data-color="blue">🔵</button>`;
        
        const title = document.createElement('div'); title.className = 'post-it-title'; title.contentEditable = "false"; title.innerHTML = titleHTML;
        const content = document.createElement('div'); content.className = 'post-it-content'; content.contentEditable = "false"; content.innerHTML = contentHTML;

        let initialText = '';
        const onFocus = (e) => initialText = e.target.innerHTML;
        const onBlur = (e) => { if (initialText !== e.target.innerHTML) pushHistory(); };
        title.addEventListener('focus', onFocus); title.addEventListener('blur', onBlur);
        content.addEventListener('focus', onFocus); content.addEventListener('blur', onBlur);

        newPostIt.append(connTop, connBottom, connLeft, connRight, moveHandle, deleteHandle, resizeHandle, menu, title, content);
        if(fSize) newPostIt.style.fontSize = fSize; else updatePostItFontSize(newPostIt);
        return newPostIt;
    }

    if (exportBtn) { exportBtn.addEventListener('click', () => { exportDataToFile(); exportBtn.textContent = '✔️'; setTimeout(() => { exportBtn.textContent = '💾'; }, 1000); }); }
    if (importBtn && fileInput) { importBtn.addEventListener('click', () => { fileInput.click(); }); fileInput.addEventListener('change', importDataFromFile); }
    if (modeBtn) { modeBtn.addEventListener('click', () => { isEditMode = !isEditMode; modeBtn.textContent = isEditMode ? '🔓' : '🔒'; if (!isEditMode) { clearSelection(); clearMultiSelection(); clearSearch(); } }); }

    function clearSelection() {
        if (selectedPostIt) {
            selectedPostIt.classList.remove('selected');
            const title = selectedPostIt.querySelector('.post-it-title'); const content = selectedPostIt.querySelector('.post-it-content');
            if (title) title.contentEditable = "false"; if (content) content.contentEditable = "false";
            const delHandle = selectedPostIt.querySelector('.delete-handle'); if (delHandle) delHandle.classList.remove('confirm'); selectedPostIt = null;
        }
        document.querySelectorAll('.arrow-path.confirm').forEach(el => el.classList.remove('confirm'));
    }

    function clearMultiSelection() { isMultiSelectMode = false; multiSelectedNodes.forEach(el => { el.classList.remove('multi-selected'); el.classList.remove('confirm-delete'); }); multiSelectedNodes = []; multiUiPanel.classList.remove('active'); }

    function getAllRelatedIds(startId) {
        let result = new Set(); let queue = [startId];
        while(queue.length > 0) { let curr = queue.shift(); result.add(curr); edges.forEach(edge => { if(edge.from === curr && !result.has(edge.to)) queue.push(edge.to); }); }
        return Array.from(result);
    }

    function toggleMultiSelect(postIt) {
        clearSelection(); const isAdding = !multiSelectedNodes.includes(postIt); const idsToToggle = getAllRelatedIds(postIt.id);
        idsToToggle.forEach(id => {
            const el = document.getElementById(id); if (!el) return;
            if (isAdding) { if (!multiSelectedNodes.includes(el)) { el.classList.add('multi-selected'); multiSelectedNodes.push(el); } } 
            else { el.classList.remove('multi-selected'); el.classList.remove('confirm-delete'); multiSelectedNodes = multiSelectedNodes.filter(n => n !== el); }
        });
        if (multiSelectedNodes.length === 0) { clearMultiSelection(); } 
        else { multiCount.textContent = `${multiSelectedNodes.length}개 선택됨`; multiUiPanel.classList.add('active'); multiSelectedNodes.forEach(el => el.classList.remove('confirm-delete')); }
    }

    function updatePostItFontSize(postIt) { const width = parseFloat(postIt.style.width) || 160; postIt.style.fontSize = `${width * 0.055}px`; }

    function collectNodesForDrag(nodeId, visited) {
        if (visited.has(nodeId)) return; visited.add(nodeId); const el = document.getElementById(nodeId);
        if (el) { draggingNodes.set(nodeId, { element: el, initialLeft: parseFloat(el.style.left || 0), initialTop: parseFloat(el.style.top || 0) }); edges.filter(edge => edge.from === nodeId).forEach(edge => collectNodesForDrag(edge.to, visited)); }
    }

    function getPortCoordinates(postItId, port) {
        const el = document.getElementById(postItId); if (!el) return { x: 0, y: 0 };
        const left = parseFloat(el.style.left || 0); const top = parseFloat(el.style.top || 0);
        const width = parseFloat(el.style.width); const height = parseFloat(el.style.height);
        if (port === 'top') return { x: left + width / 2, y: top }; if (port === 'bottom') return { x: left + width / 2, y: top + height };
        if (port === 'left') return { x: left, y: top + height / 2 }; if (port === 'right') return { x: left + width, y: top + height / 2 };
        return { x: left, y: top };
    }

    function drawArrows() {
        edges.forEach(edge => {
            let pathEl = document.getElementById(edge.id);
            if (!pathEl) {
                pathEl = document.createElementNS('http://www.w3.org/2000/svg', 'path'); pathEl.id = edge.id; pathEl.setAttribute('class', 'arrow-path'); pathEl.setAttribute('marker-end', 'url(#arrowhead)');
                pathEl.addEventListener('pointerdown', (e) => {
                    if (!isEditMode) return; e.stopPropagation();
                    if (pathEl.classList.contains('confirm')) { edges = edges.filter(ed => ed.id !== edge.id); pathEl.remove(); pushHistory(); } 
                    else { document.querySelectorAll('.arrow-path.confirm, .delete-handle.confirm').forEach(el => el.classList.remove('confirm')); multiSelectedNodes.forEach(el => el.classList.remove('confirm-delete')); pathEl.classList.add('confirm'); pathEl.setAttribute('marker-end', 'url(#arrowhead-danger)'); }
                });
                arrowLayer.appendChild(pathEl);
            } else { if(!pathEl.classList.contains('confirm')) pathEl.setAttribute('marker-end', 'url(#arrowhead)'); }

            const p1 = getPortCoordinates(edge.from, edge.fromPort); const p2 = getPortCoordinates(edge.to, edge.toPort);
            const dx = Math.abs(p2.x - p1.x) * 0.5; const dy = Math.abs(p2.y - p1.y) * 0.5; const curve = Math.max(dx, dy, 50);
            let c1x = p1.x, c1y = p1.y, c2x = p2.x, c2y = p2.y;
            if (edge.fromPort === 'top') c1y -= curve; else if (edge.fromPort === 'bottom') c1y += curve; else if (edge.fromPort === 'left') c1x -= curve; else if (edge.fromPort === 'right') c1x += curve;
            if (edge.toPort === 'top') c2y -= curve; else if (edge.toPort === 'bottom') c2y += curve; else if (edge.toPort === 'left') c2x -= curve; else if (edge.toPort === 'right') c2x += curve;
            pathEl.setAttribute('d', `M ${p1.x} ${p1.y} C ${c1x} ${c1y}, ${c2x} ${c2y}, ${p2.x} ${p2.y}`);
        });

        if (isDrawingArrow && tempEdge && tempPathElement) {
            const p1 = getPortCoordinates(tempEdge.from, tempEdge.fromPort); const p2 = { x: tempEdge.mouseX, y: tempEdge.mouseY };
            tempPathElement.setAttribute('d', `M ${p1.x} ${p1.y} Q ${(p1.x+p2.x)/2} ${p1.y}, ${p2.x} ${p2.y}`);
        }
    }

    let lastTapTime = 0;

    container.addEventListener('pointerdown', (e) => {
        if (e.pointerType === 'mouse' && e.button !== 0) return; if (!e.isPrimary) return; 
        clickStartX = e.clientX; clickStartY = e.clientY; wasLongPressed = false;

        if (e.target.closest('#ui-layer') || e.target.closest('#multi-ui-panel') || e.target.closest('#search-container')) return;

        if (!isEditMode) { isPanning = true; startX = e.clientX - translateX; startY = e.clientY - translateY; container.style.cursor = 'grabbing'; return; }

        const moveHandle = e.target.closest('.move-handle'); const resizeHandle = e.target.closest('.resize-handle');
        const deleteHandle = e.target.closest('.delete-handle'); const colorBtn = e.target.closest('.color-btn');
        const connPoint = e.target.closest('.conn-point'); const targetPostIt = e.target.closest('.post-it');
        
        document.querySelectorAll('.delete-handle.confirm').forEach(el => { if (el !== deleteHandle) el.classList.remove('confirm'); });
        document.querySelectorAll('.arrow-path.confirm').forEach(el => { if (e.target !== el) { el.classList.remove('confirm'); el.setAttribute('marker-end', 'url(#arrowhead)'); } });
        if (!deleteHandle && !e.target.closest('.multi-selected')) { multiSelectedNodes.forEach(el => el.classList.remove('confirm-delete')); }

        if (connPoint && targetPostIt && !isMultiSelectMode) {
            isDrawingArrow = true; postItStartX = e.clientX; postItStartY = e.clientY;
            tempPathElement = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            tempPathElement.setAttribute('class', 'arrow-path'); tempPathElement.setAttribute('stroke-dasharray', '5,5'); tempPathElement.setAttribute('marker-end', 'url(#arrowhead)');
            arrowLayer.appendChild(tempPathElement);
            tempEdge = { from: targetPostIt.id, fromPort: connPoint.dataset.port, mouseX: (e.clientX - translateX) / scale, mouseY: (e.clientY - translateY) / scale };
            e.stopPropagation(); return;
        }

        if (deleteHandle && targetPostIt === selectedPostIt) {
            if (deleteHandle.classList.contains('confirm')) {
                edges = edges.filter(ed => ed.from !== targetPostIt.id && ed.to !== targetPostIt.id); 
                document.querySelectorAll('.arrow-path').forEach(p => { if(!edges.find(e => e.id === p.id)) p.remove(); });
                targetPostIt.remove(); selectedPostIt = null; isDraggingPostIt = false; isResizing = false; pushHistory(); 
            } else { deleteHandle.classList.add('confirm'); }
            e.stopPropagation(); return;
        }

        if (colorBtn && targetPostIt && !isMultiSelectMode) {
            const color = colorBtn.dataset.color; targetPostIt.classList.remove('bg-yellow', 'bg-pink', 'bg-green', 'bg-blue'); targetPostIt.classList.add(`bg-${color}`); pushHistory(); e.stopPropagation(); return;
        }

        if (resizeHandle && targetPostIt === selectedPostIt) {
            isResizing = true; currentPostIt = targetPostIt; postItStartX = e.clientX; postItStartY = e.clientY; initialWidth = parseFloat(currentPostIt.style.width); initialHeight = parseFloat(currentPostIt.style.height); e.stopPropagation(); return;
        }

        if (moveHandle) {
            isDraggingPostIt = true; currentPostIt = targetPostIt; postItStartX = e.clientX; postItStartY = e.clientY; draggingNodes.clear();
            if (isMultiSelectMode && multiSelectedNodes.includes(targetPostIt)) { multiSelectedNodes.forEach(el => { draggingNodes.set(el.id, { element: el, initialLeft: parseFloat(el.style.left || 0), initialTop: parseFloat(el.style.top || 0) }); }); } 
            else { collectNodesForDrag(currentPostIt.id, new Set()); }
            e.stopPropagation(); return;
        } 
        
        if (targetPostIt && !e.target.isContentEditable) {
            longPressTimer = setTimeout(() => { wasLongPressed = true; isPanning = false; isMultiSelectMode = true; if (!multiSelectedNodes.includes(targetPostIt)) toggleMultiSelect(targetPostIt); }, 600);
            isPanning = true; startX = e.clientX - translateX; startY = e.clientY - translateY; container.style.cursor = 'grabbing'; lastTapTime = new Date().getTime(); return;
        }

        if (!targetPostIt && !e.target.closest('.arrow-path')) {
            const currentTime = new Date().getTime(); const tapLength = currentTime - lastTapTime;
            if (tapLength < 300 && tapLength > 0) { createPostIt(e.clientX, e.clientY); isPanning = false; lastTapTime = 0; } 
            else { isPanning = true; startX = e.clientX - translateX; startY = e.clientY - translateY; container.style.cursor = 'grabbing'; lastTapTime = currentTime; }
        }
    });

    window.addEventListener('pointermove', (e) => {
        if (longPressTimer && Math.hypot(e.clientX - clickStartX, e.clientY - clickStartY) > 5) { clearTimeout(longPressTimer); longPressTimer = null; }

        if (isDrawingArrow && tempEdge) {
            tempEdge.mouseX = (e.clientX - translateX) / scale; tempEdge.mouseY = (e.clientY - translateY) / scale;
            document.querySelectorAll('.post-it.drag-target').forEach(el => el.classList.remove('drag-target'));
            const hoverTarget = document.elementFromPoint(e.clientX, e.clientY)?.closest('.post-it');
            if (hoverTarget && hoverTarget.id !== tempEdge.from) hoverTarget.classList.add('drag-target');
            drawArrows(); return;
        }

        if (isResizing && currentPostIt) {
            const dx = (e.clientX - postItStartX) / scale; const dy = (e.clientY - postItStartY) / scale;
            currentPostIt.style.width = `${Math.max(2, initialWidth + dx)}px`; currentPostIt.style.height = `${Math.max(2, initialHeight + dy)}px`;
            updatePostItFontSize(currentPostIt); drawArrows(); return;
        }

        if (isDraggingPostIt && draggingNodes.size > 0) {
            const dx = (e.clientX - postItStartX) / scale; const dy = (e.clientY - postItStartY) / scale;
            draggingNodes.forEach(data => { data.element.style.left = `${data.initialLeft + dx}px`; data.element.style.top = `${data.initialTop + dy}px`; });
            drawArrows(); return;
        }
        
        if (isPanning) { translateX = e.clientX - startX; translateY = e.clientY - startY; updateTransform(); }
    });

    window.addEventListener('pointerup', (e) => {
        if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
        let hasChanges = false;

        if (isDrawingArrow) {
            const hoverConn = document.elementFromPoint(e.clientX, e.clientY)?.closest('.conn-point'); const hoverTarget = hoverConn?.closest('.post-it');
            if (hoverConn && hoverTarget && hoverTarget.id !== tempEdge.from) { edges.push({ id: generateId(), from: tempEdge.from, fromPort: tempEdge.fromPort, to: hoverTarget.id, toPort: hoverConn.dataset.port }); hasChanges = true; }
            if (tempPathElement) tempPathElement.remove(); tempPathElement = null; tempEdge = null; isDrawingArrow = false;
            document.querySelectorAll('.post-it.drag-target').forEach(el => el.classList.remove('drag-target')); drawArrows();
        }

        const moveDistance = Math.hypot(e.clientX - clickStartX, e.clientY - clickStartY);
        if (!isResizing && !isDraggingPostIt && !isDrawingArrow && moveDistance < 5 && !e.target.closest('#ui-layer') && !e.target.closest('.arrow-path') && !e.target.closest('#multi-ui-panel') && !e.target.closest('#search-container')) {
            if (justCreated) { justCreated = false; } else if (wasLongPressed) { wasLongPressed = false; } else {
                const targetPostIt = e.target.closest('.post-it');
                if (isEditMode) {
                    if (targetPostIt) {
                        if (isMultiSelectMode) { toggleMultiSelect(targetPostIt); } 
                        else { if (selectedPostIt !== targetPostIt) { clearSelection(); selectedPostIt = targetPostIt; selectedPostIt.classList.add('selected'); selectedPostIt.querySelector('.post-it-title').contentEditable = "true"; selectedPostIt.querySelector('.post-it-content').contentEditable = "true"; } }
                    } else { clearSelection(); clearMultiSelection(); clearSearch(); }
                }
            }
        }

        if (isResizing || isDraggingPostIt) hasChanges = true; 
        isPanning = false; isDraggingPostIt = false; isResizing = false; currentPostIt = null; if (container) container.style.cursor = 'grab';
        if (hasChanges) pushHistory(); 
    });

    if (alignHBtn) {
        alignHBtn.addEventListener('click', () => {
            if (multiSelectedNodes.length < 2) return;
            multiSelectedNodes.sort((a,b) => parseFloat(a.style.left) - parseFloat(b.style.left));
            let currentX = parseFloat(multiSelectedNodes[0].style.left); const targetY = parseFloat(multiSelectedNodes[0].style.top); 
            multiSelectedNodes.forEach((el, idx) => {
                if (idx > 0) { const prevEl = multiSelectedNodes[idx - 1]; const uniformGap = parseFloat(prevEl.style.width) * 0.1; currentX += parseFloat(prevEl.style.width) + uniformGap; }
                el.style.left = `${currentX}px`; el.style.top = `${targetY}px`;
            });
            drawArrows(); pushHistory(); 
        });
    }

    if (alignVBtn) {
        alignVBtn.addEventListener('click', () => {
            if (multiSelectedNodes.length < 2) return;
            multiSelectedNodes.sort((a,b) => parseFloat(a.style.top) - parseFloat(b.style.top));
            const targetX = parseFloat(multiSelectedNodes[0].style.left); let currentY = parseFloat(multiSelectedNodes[0].style.top);
            multiSelectedNodes.forEach((el, idx) => {
                if (idx > 0) { const prevEl = multiSelectedNodes[idx - 1]; const uniformGap = parseFloat(prevEl.style.height) * 0.1; currentY += parseFloat(prevEl.style.height) + uniformGap; }
                el.style.left = `${targetX}px`; el.style.top = `${currentY}px`;
            });
            drawArrows(); pushHistory(); 
        });
    }

    document.addEventListener('keydown', (e) => {
        if (!isEditMode) return; 
        if (e.target.isContentEditable || e.target.id === 'search-input') return; 

        if (e.key === 'Delete' || e.key === 'Backspace') {
            const selectedArrow = document.querySelector('.arrow-path.confirm');
            if (selectedArrow) { edges = edges.filter(ed => ed.id !== selectedArrow.id); selectedArrow.remove(); pushHistory(); return; }
            if (isMultiSelectMode && multiSelectedNodes.length > 0) {
                if (multiSelectedNodes[0].classList.contains('confirm-delete')) {
                    multiSelectedNodes.forEach(el => { edges = edges.filter(ed => ed.from !== el.id && ed.to !== el.id); el.remove(); });
                    document.querySelectorAll('.arrow-path').forEach(p => { if(!edges.find(ed => ed.id === p.id)) p.remove(); });
                    clearMultiSelection(); pushHistory();
                } else { multiSelectedNodes.forEach(el => el.classList.add('confirm-delete')); } return;
            }
            if (selectedPostIt) {
                const delHandle = selectedPostIt.querySelector('.delete-handle');
                if (delHandle) {
                    if (delHandle.classList.contains('confirm')) {
                        edges = edges.filter(ed => ed.from !== selectedPostIt.id && ed.to !== selectedPostIt.id); 
                        document.querySelectorAll('.arrow-path').forEach(p => { if(!edges.find(ed => ed.id === p.id)) p.remove(); });
                        selectedPostIt.remove(); selectedPostIt = null; pushHistory();
                    } else { delHandle.classList.add('confirm'); }
                }
            }
        }
        if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undoBtn.click(); }
    });

    container.addEventListener('wheel', (e) => {
        e.preventDefault(); const zoomSensitivity = 0.001; const delta = -e.deltaY * zoomSensitivity; let newScale = scale * (1 + delta);
        newScale = Math.max(0.05, Math.min(newScale, 10000)); translateX = e.clientX - (e.clientX - translateX) * (newScale / scale); translateY = e.clientY - (e.clientY - translateY) * (newScale / scale);
        scale = newScale; updateTransform();
    }, { passive: false });

    let lastDistance = 0, lastMidX = 0, lastMidY = 0;
    
    container.addEventListener('touchstart', (e) => {
        if (e.touches.length === 2) {
            if(longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
            isPanning = false; isDraggingPostIt = false; isResizing = false; isDrawingArrow = false; lastTapTime = 0; 
            const t1 = e.touches[0], t2 = e.touches[1];
            lastDistance = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY) || 1; lastMidX = (t1.clientX + t2.clientX) / 2; lastMidY = (t1.clientY + t2.clientY) / 2;
        }
    }, { passive: false });

    container.addEventListener('touchmove', (e) => {
        if (e.touches.length === 2) {
            e.preventDefault(); const t1 = e.touches[0], t2 = e.touches[1];
            const currentDistance = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY); const currentMidX = (t1.clientX + t2.clientX) / 2; const currentMidY = (t1.clientY + t2.clientY) / 2;
            const ratio = currentDistance / lastDistance; let newScale = Math.max(0.05, Math.min(scale * ratio, 10000)); const actualRatio = newScale / scale;
            translateX = currentMidX - (currentMidX - translateX) * actualRatio + (currentMidX - lastMidX); translateY = currentMidY - (currentMidY - translateY) * actualRatio + (currentMidY - lastMidY);
            if (isNaN(translateX) || isNaN(translateY)) { translateX = 0; translateY = 0; }
            scale = newScale; lastDistance = currentDistance === 0 ? 1 : currentDistance; lastMidX = currentMidX; lastMidY = currentMidY; updateTransform();
        }
    }, { passive: false });

    function updateTransform() { canvas.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`; }

    function createPostIt(clientX, clientY) {
        const canvasX = (clientX - translateX) / scale; const canvasY = (clientY - translateY) / scale; const baseWidth = 160 / scale; const baseHeight = 220 / scale;
        const newPostIt = buildPostItDOM(generateId(), `${canvasX}px`, `${canvasY}px`, `${baseWidth}px`, `${baseHeight}px`, 'bg-yellow', '새로운 제목', '내용을 입력하세요...', null);
        canvas.appendChild(newPostIt);
        if(!isMultiSelectMode) { clearSelection(); selectedPostIt = newPostIt; selectedPostIt.classList.add('selected'); newPostIt.querySelector('.post-it-title').contentEditable = "true"; newPostIt.querySelector('.post-it-content').contentEditable = "true"; }
        justCreated = true; newPostIt.querySelector('.post-it-title').focus(); pushHistory(); 
    }

    if (!loadDataFromLocal()) { 
        /* [신규] 최초 로드 시 캔버스 정중앙(2500, 2500)이 화면 센터에 오도록 초기 좌표 설정 */
        scale = 1;
        translateX = (window.innerWidth / 2) - 2500;
        translateY = (window.innerHeight / 2) - 2500;
        updateTransform(); pushHistory(); 
    } else { 
        updateUndoRedoUI(); 
    }
    setInterval(saveDataToLocal, 3000); 
});
</script>
</body>
